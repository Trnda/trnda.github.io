<!DOCTYPE html>
<html lang="cs"> 
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Cakes by DT | Konfigurátor</title> 
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* --- PREMIUM BAREVNÁ PALETA --- */
        :root { 
            --primary: #bc9bc2;      /* Hlavní jemná fialová */
            --primary-dark: #3a2640; /* Temná luxusní švestková pro levý panel */
            --gold: #d4af37;         /* Zlatá pro akcenty */
            --gold-light: #f3e5ab;
            --glass-light: rgba(255, 255, 255, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.4);
            --bg-dark: #0f0c29;
        }
        
        /* --- RESET A ZÁKLAD --- */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* --- ANIMOVANÉ POZADÍ (SOFT MESH GRADIENT) --- */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #1a1525; overflow: hidden;}
        .blob { position: absolute; width: 600px; height: 600px; filter: blur(120px); border-radius: 50%; animation: drift 25s infinite alternate ease-in-out; opacity: 0.6; }
        .blob.one { background: linear-gradient(135deg, #bc9bc2 0%, #764ba2 100%); top: -10%; left: -10%; }
        .blob.two { background: linear-gradient(135deg, #d4af37 0%, #ff9a9e 100%); bottom: -20%; right: -10%; animation-delay: -12s; }

        /* --- HLAVNÍ SKLENĚNÝ WRAPPER --- */
        .hlavni-wrapper { 
            display: flex; 
            width: 95%; 
            max-width: 1400px; 
            background: var(--glass-light); 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); 
            box-shadow: 0 30px 80px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.5); 
            margin: 40px 0; 
            border-radius: 40px; 
            overflow: hidden; 
            animation: entrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes entrance { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LEVÝ PANEL (LUXUSNÍ TMAVÝ) --- */
        .levy-panel { 
            flex: 0 0 400px; 
            background: linear-gradient(165deg, var(--primary-dark) 0%, #1e1422 100%); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 60px 40px; 
            color: white; 
            box-shadow: 15px 0 40px rgba(0,0,0,0.15);
            position: relative;
            z-index: 2;
        }
        
        .logo-vlevo { 
            width: 220px; height: 220px; 
            background: white; border-radius: 50%; 
            margin-bottom: 50px; 
            border: 4px solid var(--gold); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 30px rgba(212, 175, 55, 0.2);
            overflow: hidden; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        .logo-vlevo:hover { transform: scale(1.05) rotate(-5deg); }
        .logo-vlevo img { width: 100%; height: 100%; object-fit: cover; }

        /* --- FORMULÁŘ V LEVÉM PANELU --- */
        .input-group { width: 100%; margin-bottom: 25px; }
        .input-group label { 
            display: block; font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; 
            font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.6); 
        }
        .input-group input { 
            width: 100%; padding: 16px 20px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: white; 
            font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none; transition: all 0.3s ease; 
        }
        .input-group input:focus { 
            border-color: var(--gold); background: rgba(255,255,255,0.1); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); 
        }

        /* --- INSTAGRAM V LEVÉM PANELU --- */
        .gallery-label { 
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px; 
            color: var(--gold); text-align: center; margin: 40px 0 20px 0; width: 100%;
        }
        .single-photo-container { width: 100%; height: 350px; position: relative; display: flex; justify-content: center; }
        .photo-slot-main { 
            width: 100%; height: 100%; background-size: cover; background-position: center; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: opacity 1.5s ease-in-out, transform 0.5s; 
        }
        .photo-slot-main:hover { transform: scale(1.02); }

        .ig-link-wrapper { width: 100%; display: flex; justify-content: center; margin-top: 30px; }
        .ig-button-link { 
            display: flex; align-items: center; gap: 12px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); 
            padding: 14px 28px; border-radius: 30px; text-decoration: none; 
            border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s ease; 
            backdrop-filter: blur(10px);
        }
        .ig-button-link span { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
        .ig-button-link img { width: 20px; height: 20px; filter: brightness(0) invert(1); }
        .ig-button-link:hover { background: var(--gold); border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3); }

        /* --- PRAVÝ PANEL (KONFIGURÁTOR) --- */
        .obsah { flex: 1; padding: 60px 80px; overflow-y: auto; position: relative; }
        
        .top-instagram-header { text-align: right; margin-bottom: 20px; }
        .top-instagram-header a { text-decoration: none; color: var(--primary-dark); font-size: 13px; font-weight: 600; letter-spacing: 1px; transition: color 0.3s; }
        .top-instagram-header a span { color: var(--primary); font-weight: 800; border-bottom: 1px solid var(--primary); padding-bottom: 2px;}
        .top-instagram-header a:hover { color: var(--gold); }
        .top-instagram-header a:hover span { color: var(--gold); border-color: var(--gold); }

        .hlavni-motto { 
            font-family: 'Playfair Display', serif; font-style: italic; font-weight: 800;
            color: var(--primary-dark); text-align: center; font-size: 68px; 
            margin: 10px 0 60px 0; line-height: 1.1; text-shadow: 2px 5px 15px rgba(0,0,0,0.05);
        }

        /* --- SEKCE A KARTY --- */
        .sekce { 
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px);
            padding: 40px 50px; border-radius: 30px; margin-bottom: 40px; 
            border: 1px solid rgba(255,255,255,0.8); 
            box-shadow: 0 15px 35px rgba(58, 38, 64, 0.05); 
        }
        h3 { 
            color: var(--primary-dark); font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 26px; font-weight: 600; margin-bottom: 35px; 
            display: flex; align-items: center; gap: 15px;
        }
        h3::before { content: ''; display: block; width: 40px; height: 2px; background: var(--gold); }

        .flex { display: flex; gap: 30px; flex-wrap: wrap; } 
        .flex > div { flex: 1; min-width: 200px; }

        /* --- SELECTY V PRAVÉ ČÁSTI --- */
        label { display: block; font-size: 11px; font-weight: 700; color: #777; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        select { 
            width: 100%; padding: 18px 20px; border-radius: 15px; 
            border: 1px solid rgba(188, 155, 194, 0.3); background: rgba(255,255,255,0.9); 
            color: var(--primary-dark); font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23bc9bc2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 20px center; background-size: 16px;
        }
        select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(188, 155, 194, 0.1); }

        /* --- 3D STUDIO --- */
        #canvas-container { 
            width: 100%; height: 600px; 
            background: radial-gradient(circle at 50% 40%, #ffffff 0%, #e8daeb 100%); 
            position: relative; border-radius: 30px; margin-bottom: 30px; 
            cursor: grab; touch-action: none;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.05), 0 20px 40px rgba(58, 38, 64, 0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        #canvas-container:active { cursor: grabbing; }
        
        /* Skleněné štítky ve 3D okně */
        .info-badge-float { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            color: var(--primary-dark); padding: 12px 30px; border-radius: 50px; 
            font-weight: 700; font-size: 13px; z-index: 10; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        #price-display { 
            position: absolute; top: 30px; right: 30px; 
            background: linear-gradient(135deg, var(--gold), #b89325); 
            color: white; padding: 15px 30px; border-radius: 20px; 
            font-weight: 800; font-size: 18px; box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); 
            z-index: 10; border: 1px solid rgba(255,255,255,0.3);
        }

        /* --- CUSTOM SLIDERY --- */
        .controls-row { display: flex; gap: 50px; justify-content: center; margin-bottom: 50px; }
        .controls-row > div { width: 200px; }
        .slider { -webkit-appearance: none; width: 100%; height: 6px; background: #e0d5e6; border-radius: 3px; outline: none; }
        .slider::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 24px; height: 24px; 
            background: var(--primary-dark); border-radius: 50%; border: 4px solid white; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s;
        }
        .slider::-webkit-slider-thumb:hover { transform: scale(1.2); background: var(--gold); }

        /* --- DOPLŇKY (KARTY) --- */
        .doplnek-item { 
            background: rgba(255,255,255,0.8); padding: 25px 30px; 
            border-radius: 20px; margin-bottom: 20px; 
            border: 2px solid transparent; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            cursor: pointer;
        }
        .doplnek-item label { 
            margin: 0; font-size: 15px; color: var(--primary-dark); 
            display: flex; align-items: center; gap: 15px; cursor: pointer; text-transform: none; letter-spacing: normal; font-weight: 600;
        }
        /* Custom Checkbox */
        .doplnek-item input[type="checkbox"] {
            appearance: none; width: 24px; height: 24px; border: 2px solid var(--primary); 
            border-radius: 6px; position: relative; cursor: pointer; transition: 0.2s;
        }
        .doplnek-item input[type="checkbox"]:checked { background: var(--gold); border-color: var(--gold); }
        .doplnek-item input[type="checkbox"]:checked::after {
            content: '✔'; position: absolute; color: white; font-size: 14px; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .doplnek-item:has(input:checked) { border-color: var(--gold); background: #fff; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); transform: translateX(5px); }
        .extra-input { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.4s ease; }
        .doplnek-item:has(input:checked) .extra-input { max-height: 100px; opacity: 1; margin-top: 20px; }
        .extra-input input { width: 100%; padding: 16px 20px; border-radius: 12px; border: 1px solid rgba(188, 155, 194, 0.3); font-family: inherit; outline: none; }
        .extra-input input:focus { border-color: var(--primary); }

        textarea { 
            width: 100%; padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(188, 155, 194, 0.3); margin-top: 20px; 
            font-family: inherit; font-size: 15px; resize: none; box-sizing: border-box; 
            background: rgba(255,255,255,0.8); transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* --- ODESÍLACÍ TLAČÍTKO --- */
        .btn { 
            width: 100%; padding: 25px; 
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1e1422 100%); 
            color: white; border: none; border-radius: 20px; cursor: pointer; 
            font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 4px; 
            box-shadow: 0 20px 40px rgba(58, 38, 64, 0.3); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            position: relative; overflow: hidden;
        }
        .btn::after { content:''; position: absolute; top:0; left:-100%; width:50%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(58, 38, 64, 0.4); }
        .btn:hover::after { left: 100%; }

        /* --- MOBILNÍ RESPONZIVITA --- */
        @media (max-width: 1024px) {
            .hlavni-wrapper { flex-direction: column; border-radius: 0; margin: 0; width: 100%; }
            .levy-panel { width: 100%; flex: none; padding: 50px 20px; }
            .obsah { padding: 40px 20px; }
            .hlavni-motto { font-size: 42px; margin-bottom: 40px; }
            .sekce { padding: 30px 20px; border-radius: 20px; }
            #canvas-container { height: 450px; }
            .flex > div { min-width: 100%; }
            .controls-row { flex-direction: column; align-items: center; gap: 20px; }
            #price-display { top: auto; bottom: 80px; left: 50%; transform: translateX(-50%); right: auto; font-size: 16px; padding: 10px 20px;}
        }
        
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

   })();
</script>

<body>

<div class="bg-layer">
    <div class="blob one"></div>
    <div class="blob two"></div>
</div>

<form id="cakeOrderForm" style="width: 100%; display: flex; justify-content: center;">
    
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="Konfigurace_Dortu" id="hiddenConfig">
    <input type="hidden" name="Doplnky_Vypis" id="hiddenExtras">
    <input type="hidden" name="Odhadovana_Cena" id="hiddenPrice">

    <div class="hlavni-wrapper">
        <div class="levy-panel">
            <div class="logo-vlevo"><img src="logo.jpg" alt="Logo Cakes by DT"></div>
            
            <div class="kontaktni-form" style="width: 100%; max-width: 320px;">
                <div class="input-group"><label>Jméno a Příjmení</label><input type="text" name="Jmeno" required></div>
                <div class="input-group"><label>E-mail</label><input type="email" name="Email" required></div>
                <div class="input-group"><label>Telefon</label><input type="tel" name="Telefon" required></div>
                <div class="input-group"><label>Datum události</label><input type="date" name="Datum_Udalosti" required></div>
            </div>

            <div class="ig-live-gallery" style="width: 100%;">
                <p class="gallery-label">Inspirace z mé tvorby</p>
                <div class="single-photo-container">
                    <div class="photo-slot-main" id="slot1"></div>
                </div>
            </div>
            
            <div class="ig-link-wrapper">
                <a href="https://www.instagram.com/_cakesbydt_/" target="_blank" class="ig-button-link">
                    <span>Sledujte @_cakesbydt_</span>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
                </a>
            </div>
            <p style="margin-top:50px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--gold); opacity: 0.8;">Váš sladký sen</p>
        </div>

        <div class="obsah">
            <div class="top-instagram-header">
                <a href="https://www.instagram.com/_cakesbydt_/" target="_blank">
                    <i class="fab fa-instagram"></i> Více inspirace na <span>@_cakesbydt_</span>
                </a>
            </div>

            <h1 class="hlavni-motto">Upečeme vám vzpomínku</h1>
            
            <div class="sekce">
                <h3>1. Korpus</h3>
                <div class="flex">
                    <div style="flex-basis: 100%; margin-bottom: 10px;">
                        <label>Styl dortu</label>
                        <select id="cakeStyle" onchange="updateCake();">
                            <option value="classic">🎂 Klasický</option>
                            <option value="classic1">🎂 Patrový</option>
                            <option value="wedding">💍 Svatební</option>
                        </select>
                    </div>
                    <div><label>Průměr</label><select id="diameter" onchange="updateCake();">
                        <option value="15">16 cm (8-10 porcí)</option>
                        <option value="18">18 cm (10-12 porcí)</option>
                        <option value="20" selected>20 cm (12-14 porcí)</option>
                        <option value="22">22 cm (14-16 porcí)</option>
                        <option value="24">24 cm (16-18 porcí)</option>
                        <option value="26">26 cm (18-20 porcí)</option>
                    </select></div>
                    
                   <div><label>Patra</label><select id="layers" onchange="updateCake();">
    <option value="2" selected>2 patra </option>
    <option value="3">3 patra </option>
</select></div>
                    
                    <div><label>Chuť korpusu</label><select id="flavor" onchange="updateCake();">
                        <option value="0x6e5445">Kakaový</option>
                        <option value="0xfff1a3">Vanilkový</option>
                        <option value="0xeba254">Mrkvový</option>
                        <option value="0x3b7a31">Mechový</option>
                        <option value="0x96915c">Ořechový</option>
                    </select></div>
                </div>
            </div>

            <div class="sekce">
                <h3>2. Design & Krém</h3>
                <div class="flex">
                    <div><label>Styl obmazu</label><select id="coating" onchange="updateCake();"><option value="semi" selected>Nahý dort</option><option value="full" >Plný obmaz</option></select></div>
                    <div><label>Vnitřní krém</label><select id="innerCream" onchange="updateCake();">
                        <option value="0xFFF6C9">Smetanový - vanilka</option>
                        <option value="0x8C7464">Smetanový - čokoláda</option>
                        <option value="0xFF9852">Smetanový - karamel</option>
                        <option value="0xED3939">Smetanový - ovocný</option>                       
                    </select></div>
                    <div><label>Vnější krém</label><select id="outerCream" onchange="updateCake();">
                        <option value="0xFFF6C9">Smetanový - vanilka</option>
                        <option value="0x8C7464">Smetanový - čokoláda</option>
                        <option value="0xFF9852">Smetanový - karamel</option>
                        <option value="0xED3939">Smetanový - ovocný</option>
                        <option value="0xFFF6C9">Máslový - vanilka</option>
                        <option value="0x8C7464">Máslový - čokoláda</option>
                        <option value="0xFF9852">Máslový - karamel</option>
                        <option value="0xED3939">Máslový - ovocný</option>
                    </select></div>
                </div>
            </div>

            <div class="sekce">
                <h3>3. Ovocná kompozice</h3>
                <div class="flex">
                    <div><label>Proložení uvnitř</label><select id="fruitCream" onchange="updateCake();">
                        <option value="none" selected>Bez ovoce</option>
                        <option value="strawberries" >Jahody</option>
                        <option value="raspberries" >Maliny</option>
                        <option value="blueberries" >Borůvky</option>
                        <option value="mix">Mix ovoce</option>
                        <option value="0xF02800">Želatinový ovocný puk</option>
                        <option value="0x825842">Čokoládový puk</option>
                    </select></div>
                    
                    <div><label>Zdobení nahoře</label><select id="fruitTop" onchange="updateCake();">
                        <option value="none" selected>Bez zdobení</option>
                        <option value="strawberries" >Jahody</option>
                        <option value="raspberries" >Maliny</option>
                        <option value="blueberries" >Borůvky</option>
                        <option value="mix">Bohatý Mix</option>
                    </select></div>
                    
                    <div><label>Styl vršku</label><select id="topStyle" onchange="updateCake();">
                        <option value="border">Věneček (Okraje)</option>
                        <option value="full" selected>Plné zaplnění</option>
                    </select></div>
                </div>
            </div>

            <div id="canvas-container">
                <div id="info-display" class="info-badge-float">--</div>
                <div id="price-display">--</div>
            </div>
            
            <div class="controls-row">
                <div><label style="text-align: center;">Rotace 3D modelu</label><input type="range" id="rotateY" class="slider" min="-3.14" max="3.14" step="0.01" value="0.5" oninput="manualControl()"></div>
                <div><label style="text-align: center;">Náklon pohledu</label><input type="range" id="rotateX" class="slider" min="-0.6" max="0.6" step="0.01" value="0.2" oninput="manualControl()"></div>
                <div><label style="text-align: center;">Přiblížení (Zoom)</label><input type="range" id="zoomCam" class="slider" min="8" max="28" step="0.5" value="14" oninput="manualControl()"></div>
            </div>

            <div class="sekce">
                <h3>4. Osobní doplňky</h3>
                <div class="doplnek-item">
                    <label><input type="checkbox" id="c_flowers" onchange="calculatePrice()"> Květinová dekorace</label>
                    <div class="extra-input"><input type="text" name="Detail_Kvetiny" placeholder="Jaké květiny si přejete (druh, barva)?"></div>
                </div>
                <div class="doplnek-item">
                    <label><input type="checkbox" id="c1" onchange="calculatePrice()"> Jedlý papír</label>

<script>
    let scene, camera, renderer, cakeGroup;
    let isDragging = false; 
    let previousPosition = { x: 0, y: 0 };
    const container = document.getElementById('canvas-container');
    let compressedImageData = ""; // Sem si uložíme zmenšenou fotku

function updateFileName() {
    const fileInput = document.getElementById('cakePhoto');
    const fileText = document.getElementById('fileText');
    const file = fileInput.files[0];

    if (file) {
        fileText.innerText = "Zmenšuji fotku...";
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                // MAXIMÁLNÍ ROZMĚR (šířka nebo výška)
                const MAX_WIDTH = 400;
                const MAX_HEIGHT = 400;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // KOMPRESE na 0.6 (60% kvalita JPEG - pro náhled stačí)
                compressedImageData = canvas.toDataURL('image/jpeg', 0.6);
                
                fileText.innerText = "Vybráno a zmenšeno: " + file.name;
                fileText.style.color = "#d4af37";
                console.log("Fotka zmenšena pro EmailJS");
            };
        };
    }
}

// ... pak pokračuje zbytek tvého kódu (init3D, animate, atd.)

    function init3D() {
        if (!container) return;

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 6, 14); 
        camera.lookAt(0, 2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.9); 
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        cakeGroup = new THREE.Group();
        cakeGroup.rotation.y = 0.5;
        scene.add(cakeGroup);
        
        updateCake(); 
        animate();    

        const getPoint = (e) => {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        };

        const handleStart = (e) => {
            isDragging = true;
            const point = getPoint(e);
            previousPosition = point;
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();

            const point = getPoint(e);
            const deltaX = point.x - previousPosition.x;
            const deltaY = point.y - previousPosition.y;

            const sensitivity = 0.007; 
            cakeGroup.rotation.y += deltaX * sensitivity;
            
            let newRotX = cakeGroup.rotation.x + deltaY * sensitivity;
            cakeGroup.rotation.x = Math.max(-0.6, Math.min(0.6, newRotX));

            previousPosition = point;

            document.getElementById('rotateY').value = cakeGroup.rotation.y;
            document.getElementById('rotateX').value = cakeGroup.rotation.x;
        };

        const handleEnd = () => { isDragging = false; };

        container.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove, { passive: false });
        window.addEventListener('mouseup', handleEnd);
        container.addEventListener('touchstart', handleStart, { passive: false });
        container.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // Zoomování pomocí kolečka myši nad 3D oknem
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSlider = document.getElementById('zoomCam');
            let newVal = parseFloat(zoomSlider.value) + (e.deltaY * 0.01);
            newVal = Math.max(zoomSlider.min, Math.min(zoomSlider.max, newVal));
            zoomSlider.value = newVal;
            manualControl();
        }, { passive: false });
    }

  function createFruit(type, isTop) {
        const group = new THREE.Group();
        let finalType = type;
        if (type === 'mix') {
            const rand = Math.random();
            finalType = rand < 0.33 ? 'strawberries' : (rand < 0.66 ? 'blueberries' : 'raspberries');
        }

        if (finalType === 'strawberries') {
            const size = isTop ? 0.22 : 0.15;
            
            // 1. Tělo jahody - čistá, do výšky protažená koule (konec placatých rajčat)
            const strawberryGeo = new THREE.SphereGeometry(size, 24, 24);
            const strawberryMat = new THREE.MeshPhongMaterial({ 
                color: 0xd31027, // Sytá, temnější jahodová červená
                shininess: 30,
                specular: 0x555555
            });
            
            const body = new THREE.Mesh(strawberryGeo, strawberryMat);
            // Zúžíme osu X a Z, pořádně protáhneme osu Y
            body.scale.set(0.85, 1.3, 0.85); 
            // Jahodu o kousíček zvedneme, aby "seděla" a nepropadala se do krému
            body.position.y = size * 0.4; 
            group.add(body);

            // 2. Zelené lístky (kalich) nahoře
            const leafMat = new THREE.MeshPhongMaterial({ color: 0x2d5a1e, side: THREE.DoubleSide });
            for (let i = 0; i < 6; i++) {
                const leafGeo = new THREE.ConeGeometry(size * 0.25, size * 0.6, 3);
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                
                // Umístíme těsně na vrchol protažené jahody
                leaf.position.y = size * 1.45; 
                
                // Rozmístíme do kruhu a sklopíme podél těla
                leaf.rotation.y = (i * Math.PI * 2) / 6;
                leaf.rotation.x = Math.PI / 2 + 0.3; // Sklon jemně dolů po povrchu
                
                leaf.geometry.translate(0, -size * 0.25, 0); 
                group.add(leaf);
            }

        // --- ZBYTEK KÓDU PRO MALINY A BORŮVKY (z předchozí zprávy) ---
        } else if (finalType === 'raspberries') {
            const size = isTop ? 0.20 : 0.15; 
            const berryMat = new THREE.MeshPhongMaterial({ color: 0xc71585, shininess: 40, specular: 0xff88aa });
            const drupeletSize = size * 0.22;
            const layers = [
                { count: 1, y: size * 0.7, r: 0 },                  
                { count: 5, y: size * 0.4, r: size * 0.35 },        
                { count: 8, y: size * 0.1, r: size * 0.55 },        
                { count: 9, y: -size * 0.2, r: size * 0.65 },       
                { count: 10, y: -size * 0.5, r: size * 0.65 }       
            ];
            layers.forEach((layer, layerIndex) => {
                for (let i = 0; i < layer.count; i++) {
                    const bubbleGeo = new THREE.SphereGeometry(drupeletSize, 8, 8);
                    const bubble = new THREE.Mesh(bubbleGeo, berryMat);
                    const offset = (layerIndex % 2 === 0) ? 0 : (Math.PI / layer.count);
                    const angle = (i / layer.count) * Math.PI * 2 + offset;
                    bubble.position.set(Math.cos(angle) * layer.r, layer.y, Math.sin(angle) * layer.r);
                    bubble.lookAt(0, layer.y, 0);
                    bubble.scale.set(1, 1, 0.8);
                    group.add(bubble);
                }
            });
        } else {
            const size = isTop ? 0.12 : 0.08;
            const blueGeo = new THREE.SphereGeometry(size, 16, 16);
            const blueMat = new THREE.MeshPhongMaterial({ color: 0x222244, shininess: 10, specular: 0x444466 });
            const blueberry = new THREE.Mesh(blueGeo, blueMat);
            blueberry.scale.set(1, 0.85, 1);
            const crownGeo = new THREE.CylinderGeometry(size*0.3, size*0.1, size*0.05, 5);
            const crown = new THREE.Mesh(crownGeo, blueMat);
            crown.position.y = size * 0.85;
            group.add(crown);
            group.add(blueberry);
        }

        return group;
    }

    function calculatePrice() {
        const diameter = parseInt(document.getElementById('diameter').value);
        const style = document.getElementById('cakeStyle').value;
        const coat = document.getElementById('coating').value;
        const flavorText = document.getElementById('flavor').options[document.getElementById('flavor').selectedIndex].text;
        
        // Zjištění počtu pater - klasika má vždy 1 patro, svatební podle dropdownu
        let numTiers = style === 'classic' ? 1 : parseInt(document.getElementById('layers').value);
        let total = 0;
        
        // Cena se počítá za každé patro zvlášť (každé další je užší, spotřebuje méně surovin)
        for (let t = 0; t < numTiers; t++) {
            let tierDiameter = diameter * Math.pow(0.75, t); 
            total += (tierDiameter * 15) * 3; // 3 = (6 vrstev / 2) pro zachování tvé původní ceny
        }

        if (style === 'wedding') total += 1500; 
        if (style === 'classic1') total += 100; 
        if (flavorText.includes("Ořechový")) total += 80 * numTiers;
        if (flavorText.includes("Mrkvový")) total += 100 * numTiers;
        if (flavorText.includes("Mechový")) total += 100 * numTiers;
        if (flavorText.includes("Kakaový")) total += 50 * numTiers;
        
        if (coat === 'full') total += 150 * numTiers;
        if (document.getElementById('fruitCream').value !== 'none') total += 100 * numTiers;
        if (document.getElementById('fruitTop').value !== 'none') total += 100; // Horní zdobení počítáme paušálně
        if (document.getElementById('fruitCream').value !== 'none') total += 50 * numTiers;
        
        if (document.getElementById('c_flowers').checked) total += 150;
        if (document.getElementById('c1').checked) total += 300;
        if (document.getElementById('c2').checked) total += 200;
        if (document.getElementById('c3').checked) total += 50;

        const minPrice = Math.round(total * 0.95);
        const maxPrice = Math.round(total * 1.05);

        const infoText = `${style === 'wedding' ? 'Svatební ('+numTiers+' patra)' : 'Klasický (1 patro)'} | Ø základny ${diameter}cm`;
    //  const infoText = `${style === 'classic1' ? 'Patrový ('+numTiers+' patra)' : 'Klasický (1 patro)'} | Ø základny ${diameter}cm`;
        const priceText = `${minPrice} – ${maxPrice} Kč`;

        document.getElementById('info-display').innerText = infoText;
        document.getElementById('price-display').innerText = "ODHAD: " + priceText;
    }

 function updateCake() {
    if (!cakeGroup) return;
    while(cakeGroup.children.length > 0) cakeGroup.remove(cakeGroup.children[0]);
    
    const style = document.getElementById('cakeStyle').value;
    const diameter = parseInt(document.getElementById('diameter').value);
    let numTiers = style === 'classic' ? 1 : parseInt(document.getElementById('layers').value);

    const coat = document.getElementById('coating').value;
    const fruitT = document.getElementById('fruitTop').value;
    const fruitC = document.getElementById('fruitCream').value;
    const topS = document.getElementById('topStyle').value;
    const flavorColor = parseInt(document.getElementById('flavor').value);
    const innerColor = parseInt(document.getElementById('innerCream').value);
    const outerColor = parseInt(document.getElementById('outerCream').value);
    
    const baseRadius = diameter / 6.5; 
    const h = 0.5; 
    const layersPerTier = 6; 

    for (let t = 0; t < numTiers; t++) {
        let currentRadius = baseRadius * Math.pow(0.75, t); 
        
        for (let l = 0; l < layersPerTier; l++) {
            const isCream = (l % 2 === 1); 
            const globalIndex = (t * layersPerTier) + l; 
            
          // 1. KORPUS / KRÉM
            const isFillingPresent = (fruitC !== 'none');
            const segmentMat = new THREE.MeshPhongMaterial({ 
                color: isCream ? innerColor : flavorColor,
                transparent: isCream && isFillingPresent,
                opacity: (isCream && isFillingPresent) ? 0.4 : 1.0, // Ještě víc průhledné (0.4)
                depthWrite: !(isCream && isFillingPresent), // KLÍČOVÉ: Vypne blokování hloubky pro náplň
                side: THREE.DoubleSide
            });

            const segment = new THREE.Mesh(
                new THREE.CylinderGeometry(currentRadius, currentRadius, h, 48),
                segmentMat
            );
            segment.position.y = globalIndex * h;
            // Krému dáme nižší renderOrder
            if (isCream && isFillingPresent) segment.renderOrder = 0; 
            cakeGroup.add(segment);

            // 2. OBMAZ (COATING)
            if (coat !== 'naked') {
                const coatMesh = new THREE.Mesh(
                    new THREE.CylinderGeometry(currentRadius + 0.02, currentRadius + 0.02, h, 48, 1, true), 
                    new MeshPhongMaterialConfig(outerColor, coat)
                );
                coatMesh.position.y = globalIndex * h;
                cakeGroup.add(coatMesh);

                if (l === layersPerTier - 1) {
                    const topCapGeo = new THREE.CircleGeometry(currentRadius + 0.02, 48);
                    const topCap = new THREE.Mesh(topCapGeo, new MeshPhongMaterialConfig(outerColor, coat));
                    topCap.position.y = (globalIndex * h) + (h / 2) + 0.01; 
                    topCap.rotation.x = -Math.PI / 2; 
                    cakeGroup.add(topCap);
                }
            }

         // 3. VNITŘNÍ NÁPLŇ (Ovoce nebo Puk)
            if (isCream && isFillingPresent && l < layersPerTier - 1) {
                if (fruitC.startsWith('0x')) {
                    const puckColor = parseInt(fruitC);
                    const puckHeight = 0.25; // O něco vyšší, aby byl dominantní
                    
                    // UDĚLÁME PUK JAKO PRSTENEC (o 0.05 užší než krém)
                    // CylinderGeometry(radiusTop, radiusBottom, height, segments, heightSegments, openEnded)
                    const puckGeo = new THREE.CylinderGeometry(currentRadius - 0.02, currentRadius - 0.02, puckHeight, 48, 1, false);
                    const puckMat = new THREE.MeshPhongMaterial({ 
                        color: puckColor,
                        emissive: puckColor, // Přidáme trochu "vlastního světla", aby v krému zářil
                        emissiveIntensity: 0.2,
                        transparent: false, // Puk sám nemusí být průhledný, chceme ho vidět sytě
                        side: THREE.DoubleSide
                    });
                    
                    const puck = new THREE.Mesh(puckGeo, puckMat);
                    puck.renderOrder = 10; // Mnohem vyšší priorita vykreslení
                    puck.position.y = globalIndex * h;
                    cakeGroup.add(puck);

                } else {
                    // Ovoce s vysokým renderOrderem
                    for (let j = 0; j < 35; j++) { 
                        let activeType = fruitC === 'mix' ? ['strawberries', 'raspberries', 'blueberries'][Math.floor(Math.random() * 3)] : fruitC;
                        const f = createFruit(activeType, false);
                        f.renderOrder = 10; 
                        const randomAng = Math.random() * Math.PI * 2;
                        const r = currentRadius * (0.8 + Math.random() * 0.18); // Ještě víc na kraj
                        f.position.set(Math.cos(randomAng) * r, (globalIndex * h), Math.sin(randomAng) * r);
                        f.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
                        cakeGroup.add(f);
                    }
                }
            }

            // 4. HORNÍ ZDOBENÍ A TERASY (Tahle část ti tam chyběla!)
            const isTopSurfaceOfTier = (l === layersPerTier - 1);
            const isAbsoluteTop = (t === numTiers - 1 && isTopSurfaceOfTier);
            const isTerrace = (t < numTiers - 1 && isTopSurfaceOfTier);

            if ((isAbsoluteTop || isTerrace) && fruitT !== 'none') {
                if (isAbsoluteTop) {
                    if (topS === 'full') {
                        const area = Math.PI * Math.pow(currentRadius, 2);
                        let count = Math.min(Math.floor(area * 10), 80); // Strop 80ks, aby to nespadlo
                        for(let j = 0; j < count; j++) {
                            const f = createFruit(fruitT, true);
                            const r = (currentRadius * 0.85) * Math.sqrt(Math.random()); 
                            const theta = Math.random() * Math.PI * 2;
                            f.position.set(Math.cos(theta) * r, (globalIndex * h) + 0.3, Math.sin(theta) * r);
                            f.rotation.set(Math.random() * 0.4, Math.random() * 6, Math.random() * 0.4);
                            cakeGroup.add(f);
                        }
                    } else {
                        const r = currentRadius * 0.85;
                        const count = Math.max(Math.floor(r * 12), 1);
                        for(let j = 0; j < count; j++) {
                            const f = createFruit(fruitT, true);
                            const ang = (j / count) * Math.PI * 2;
                            f.position.set(Math.cos(ang) * r, (globalIndex * h) + 0.3, Math.sin(ang) * r);
                            cakeGroup.add(f);
                        }
                    }
                } else if (isTerrace) {
                    const nextRadius = baseRadius * Math.pow(0.75, t + 1); 
                    const r = nextRadius + ((currentRadius - nextRadius) * 0.5); 
                    const count = Math.max(Math.floor(r * 10), 1); 
                    for(let j = 0; j < count; j++) {
                        const f = createFruit(fruitT, true);
                        const ang = (j / count) * Math.PI * 2;
                        f.position.set(Math.cos(ang) * r, (globalIndex * h) + 0.3, Math.sin(ang) * r);
                        cakeGroup.add(f);
                    }
                }
            }
        }
    }
    calculatePrice(); 
    
    const zoomSlider = document.getElementById('zoomCam');
    if (zoomSlider) {
        if (numTiers >= 3) zoomSlider.value = 22;
        else if (numTiers === 2) zoomSlider.value = 18;
        else zoomSlider.value = 14;
        manualControl();
    }
}

    // Malá pomocná funkce pro materiál obmazu, aby kód nebyl nekonečný
    function MeshPhongMaterialConfig(outerColor, coat) {
        return new THREE.MeshPhongMaterial({ 
            color: outerColor, 
            transparent: true, 
            opacity: (coat === 'semi' ? 0.5 : 1), 
            side: THREE.DoubleSide 
        });
    }
    
    function manualControl() {
        if (!cakeGroup) return;
        cakeGroup.rotation.y = parseFloat(document.getElementById('rotateY').value);
        cakeGroup.rotation.x = parseFloat(document.getElementById('rotateX').value);
        
        // Plynulý Zoom kamery
        const zoomValue = parseFloat(document.getElementById('zoomCam').value);
        camera.position.z = zoomValue;
        // Lehce upravíme i výšku kamery a střed pohledu, aby dort neutekl nahoru
        camera.position.y = zoomValue * 0.4; 
        camera.lookAt(0, zoomValue * 0.15, 0); 
    }

    function animate() {
    requestAnimationFrame(animate);
    if (renderer && scene && camera) {
        renderer.render(scene, camera);
    }
}

document.getElementById('cakeOrderForm').addEventListener('submit', function(e) {

    const btn = this.querySelector('.btn');

    const getText = (id) => {

    if(document.getElementById('c1')?.checked) doplnkyArr.push("Jedlý papír (" + (document.getElementsByName('Detail_Papir')[0]?.value || "Ano") + ")");
    if(document.getElementById('c2')?.checked) doplnkyArr.push("Figurka (" + (document.getElementsByName('Detail_Figurka')[0]?.value || "Ano") + ")");
    if(document.getElementById('c3')?.checked) doplnkyArr.push("Zápich (" + (document.getElementsByName('Detail_Zapich')[0]?.value || "Ano") + ")");

    const templateParams = {
        jmeno: document.getElementsByName('Jmeno')[0].value,

        telefon: document.getElementsByName('Telefon')[0].value,
        datum: document.getElementsByName('Datum_Udalosti')[0].value,
        styl_dortu: getText('cakeStyle'),
        rozmery: `Průměr ${document.getElementById('diameter').value} cm, ${document.getElementById('layers').value} vrstev`,
        chut_korpusu: getText('flavor'),
        vzhled_krem: `Obmaz: ${getText('coating')}, Vnitřní: ${getText('innerCream')}, Vnější: ${getText('outerCream')}`,

// Seznam tvých 19 fotek (předpokládám názvy 1.jpg až 19.jpg)
const allImages = [
    'foto19.jpg', 'foto2.jpg', 'foto3.jpg', 'foto4.jpg', 'foto5.jpg', 'foto6.jpg', 'foto7.jpg', 'foto8.jpg', 'foto9.jpg', 'foto10.jpg', 
    'foto11.jpg', 'foto12.jpg', 'foto13.jpg', 'foto14.jpg', 'foto15.jpg', 'foto16.jpg', 'foto17.jpg', 'foto18.jpg', 'foto1.jpg'
];

let currentImageIndex = 0; // Začínáme od první fotky
let isTransitioning = false; 

// --- Tato část patří na konec tvého <script> ---

function updateGallery() {
    if (isTransitioning) return; 
    
    const mainSlot = document.getElementById('slot1');
    if (!mainSlot || allImages.length === 0) return;

    isTransitioning = true;
    mainSlot.style.opacity = '0'; 

    // Posuneme index na další fotku
    currentImageIndex = (currentImageIndex + 1) % allImages.length;
    const nextPhoto = allImages[currentImageIndex];
    
    const tempImage = new Image();
    
    setTimeout(() => {
        tempImage.onload = () => {
            mainSlot.style.backgroundImage = `url('${nextPhoto}')`;
            setTimeout(() => {
                mainSlot.style.opacity = '1'; 
                isTransitioning = false; 
            }, 50);
        };
        tempImage.src = nextPhoto;
    }, 1200); 
}

// SPOJENÉ A OPRAVENÉ SPOUŠTĚNÍ
window.addEventListener('DOMContentLoaded', () => {
    const mainSlot = document.getElementById('slot1');
    if(mainSlot && allImages.length > 0) {
        // Nastavíme první fotku hned při startu
        mainSlot.style.backgroundImage = `url('${allImages[0]}')`;
    }
    
    // Tady si vyber čas: 10000 = 10 vteřin, 3000 = 3 vteřiny
    // Necháme 6000 (6 vteřin), ať si to lidi stihnou prohlédnout
    setInterval(updateGallery, 6000);
});

// Inicializace 3D modelu
window.onload = init3D;

</script>
